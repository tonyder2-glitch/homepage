<!doctype html>

<html lang="zh-Hant">

<head>

<meta charset="UTF-8" />

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>即時圖片看板</title>

<style>

:root {
  color-scheme: light dark;
}

body {

  margin: 0;

  font-family:
    system-ui,
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    sans-serif;

  background: #111;

  color: #fff;

  display: flex;

  flex-direction: column;

  align-items: center;

  justify-content: center;

  min-height: 100vh;

  gap: 16px;

  padding: 24px;

  box-sizing: border-box;
}

.wrap {

  width: 100%;

  max-width: 2400px;

  text-align: center;
}

h1 {

  margin: 0 0 8px;

  font-size: 28px;
}

p {

  margin: 0;

  opacity: 0.8;
}

.image-box {

  margin-top: 20px;

  width: 100%;

  overflow-x: auto;

  overflow-y: auto;

  display: block;

  background: #1b1b1b;

  border-radius: 16px;

  box-shadow:
    0 10px 30px rgba(0, 0, 0, 0.35);
}

img {

  display: block;

  width: auto;

  height: auto;

  max-width: none;

  max-height: none;
}

.meta {

  margin-top: 12px;

  font-size: 14px;

  opacity: 0.75;
}

button {

  margin-top: 12px;

  border: 0;

  border-radius: 10px;

  padding: 10px 16px;

  font-size: 15px;

  cursor: pointer;
}

.note-box {

  margin-top: 20px;

  padding: 18px 22px;

  background: #1b1b1b;

  border-radius: 14px;

  text-align: left;

  line-height: 1.8;

  font-size: 15px;

  color: #eee;
}

.note-box h2 {

  margin: 0 0 10px;

  font-size: 20px;
}

.note-box p {

  margin: 6px 0;

  opacity: 0.9;
}

.blue {
  color: #4da3ff;
}

.orange {
  color: #ff9f43;
}

/* ========================= */
/* JSON 自動欄位 */
/* ========================= */

.json-grid {

  display: grid;

  grid-template-columns:
    repeat(
      auto-fit,
      minmax(260px, 1fr)
    );

  gap: 12px;

  margin-top: 12px;
}

.json-card {

  background: #222;

  border-radius: 12px;

  padding: 12px 14px;

  border: 1px solid #333;

  transition: 0.2s;
}

.json-card:hover {

  border-color: #4da3ff;

  transform: translateY(-2px);
}

.json-key {

  color: #4da3ff;

  font-size: 13px;

  margin-bottom: 6px;

  word-break: break-word;
}

.json-value {

  color: #fff;

  font-size: 15px;

  word-break: break-word;

  white-space: pre-wrap;
}

</style>

</head>

<body>

<div class="wrap">

<h1>即時圖片看板</h1>

<p>每 60 秒自動更新一次</p>

<!-- ========================= -->
<!-- 圖片 -->
<!-- ========================= -->

<div class="image-box">

  <img
    id="liveImage"
    alt="即時更新圖片"
    referrerpolicy="no-referrer"
  />

</div>

<!-- ========================= -->
<!-- 圖表說明 -->
<!-- ========================= -->

<div class="note-box">

<h2>圖表說明</h2>

<p>
  <strong class="blue">藍色線</strong>
  ：期貨價格
</p>

<p>
  <strong class="orange">橘色線</strong>
  ：OP 價格
</p>

<p>
  OP 開盤時，
  價格常會出現向上或向下的瞬間突波。
</p>

<p>
  <strong>向上突波</strong>
  通常代表賣方壓力集中在
  <strong>SC</strong>；
  期貨應在 OP 下方，
  否則為
  <strong>嘎空</strong>。
</p>

<p>
  <strong>向下突波</strong>
  通常代表賣方壓力集中在
  <strong>SP</strong>；
  期貨應在 OP 上方，
  否則為
  <strong>殺多</strong>。
</p>

</div>

<!-- ========================= -->
<!-- JSON 動態分析 -->
<!-- ========================= -->

<div class="note-box">

<h2>OP 分析</h2>

<div
  id="jsonGrid"
  class="json-grid"
>
  讀取中...
</div>

</div>

<!-- ========================= -->
<!-- 狀態 -->
<!-- ========================= -->

<div
  class="meta"
  id="status"
>
  載入中...
</div>

<button id="refreshBtn">

立即更新

</button>

</div>

<script>

/* ========================= */
/* 設定 */
/* ========================= */

const baseImageUrl =
"https://lh3.googleusercontent.com/d/1cjgZRcPDkmCGkrvmcqAFqsoltBbvUpm0";

const jsonUrl =
"https://script.google.com/macros/s/AKfycbxHjL9sVpsBnmB_YE5ssLttQW_EZHknqNwUmLDENrzCf5wI8Q68T_VOt009uduUOVHR/exec";

/* ========================= */
/* DOM */
/* ========================= */

const imageEl =
document.getElementById("liveImage");

const statusEl =
document.getElementById("status");

const refreshBtn =
document.getElementById("refreshBtn");

const imageBox =
document.querySelector(".image-box");

/* ========================= */
/* 狀態 */
/* ========================= */

function setStatus(text) {

  statusEl.textContent = text;
}

/* ========================= */
/* 更新圖片 */
/* ========================= */

function refreshImage() {

  const now = new Date();

  setStatus("圖片更新中...");

  imageEl.referrerPolicy =
  "no-referrer";

  imageEl.onload = () => {

    requestAnimationFrame(() => {

      imageBox.scrollLeft =
        imageBox.scrollWidth -
        imageBox.clientWidth;

    });

    setStatus(
      `圖片上次更新：
      ${now.toLocaleString("zh-TW")}`
    );
  };

  imageEl.onerror = () => {

    setStatus("圖片載入失敗");
  };

  imageEl.src = "";

  imageEl.src =
  `${baseImageUrl}?t=${Date.now()}`;
}

/* ========================= */
/* JSON 扁平化 */
/* ========================= */

function flattenJson(
  obj,
  prefix = ""
) {

  const result = {};

  for (const key in obj) {

    const value = obj[key];

    const newKey =
      prefix
      ? `${prefix}.${key}`
      : key;

    if (

      value !== null &&

      typeof value === "object" &&

      !Array.isArray(value)

    ) {

      Object.assign(
        result,
        flattenJson(
          value,
          newKey
        )
      );

    } else if (
      Array.isArray(value)
    ) {

      result[newKey] =
      JSON.stringify(
        value,
        null,
        2
      );

    } else {

      result[newKey] =
      value;
    }
  }

  return result;
}

/* ========================= */
/* 顯示 JSON */
/* ========================= */

function renderJsonColumns(data) {

  const grid =
  document.getElementById(
    "jsonGrid"
  );

  const flatData =
  flattenJson(data);

  grid.innerHTML = "";

  for (const key in flatData) {

    const value =

      flatData[key] === null ||

      flatData[key] === undefined

      ? "-"

      : flatData[key];

    const card =
    document.createElement("div");

    card.className =
    "json-card";

    card.innerHTML = `

      <div class="json-key">
        ${key}
      </div>

      <div class="json-value">
        ${value}
      </div>

    `;

    grid.appendChild(card);
  }
}

/* ========================= */
/* 更新 JSON */
/* ========================= */

async function refreshJson() {

  const grid =
  document.getElementById(
    "jsonGrid"
  );

  try {

    const res = await fetch(
      jsonUrl +
      "?t=" +
      Date.now()
    );

    const data =
    await res.json();

    renderJsonColumns(data);

  } catch (err) {

    console.error(err);

    grid.innerText =
    "JSON 載入失敗";
  }
}

/* ========================= */
/* 更新全部 */
/* ========================= */

function refreshAll() {

  refreshImage();

  refreshJson();
}

/* ========================= */
/* 按鈕 */
/* ========================= */

refreshBtn.addEventListener(
  "click",
  refreshAll
);

/* ========================= */
/* 初始執行 */
/* ========================= */

refreshAll();

/* ========================= */
/* 自動更新 */
/* ========================= */

setInterval(
  refreshImage,
  60 * 1000
);

setInterval(
  refreshJson,
  60 * 1000
);

</script>

</body>

</html>
