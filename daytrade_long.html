<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>內嵌 Excel</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    .container {
      width: 100%;
      height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <iframe
      src="https://docs.google.com/spreadsheets/d/1rnfq9Px8H1BPWRYqmk5lmp6CqgUXD2Pi/edit?usp=sharing"
      allowfullscreen>
    </iframe>
  </div>
</body>
</html>
